syntax = "proto3";

package gravity.v1;

option go_package = "github.com/dhiaayachi/gravity-ai/proto/gravity/v1;gravityv1";

service GravityService {
  rpc SubmitTask(SubmitTaskRequest) returns (SubmitTaskResponse);
  rpc SubmitVote(SubmitVoteRequest) returns (SubmitVoteResponse);
  rpc SubmitAnswer(SubmitAnswerRequest) returns (SubmitAnswerResponse);
  rpc UpdateMetadata(UpdateMetadataRequest) returns (UpdateMetadataResponse);
}

message SubmitTaskRequest {
  string content = 1;
  string requester = 2; // Optional, defaults to "api-user"
}

message SubmitTaskResponse { string task_id = 1; }

message SubmitVoteRequest {
  string task_id = 1;
  string agent_id = 2;
  bool accepted = 3;
  string reasoning = 4; // Why the agent voted this way
  string rebuttal = 5;  // Counter-proposal if rejected
  int32 round = 6;      // Voting round number
}

message SubmitVoteResponse {
  bool success = 1;
  string message = 2;
}

message SubmitAnswerRequest {
  string task_id = 1;
  string agent_id = 2;
  string content = 3;
}

message SubmitAnswerResponse {
  bool success = 1;
  string message = 2;
}

message UpdateMetadataRequest {
  string agent_id = 1;
  string llm_provider = 2;
  string llm_model = 3;
}

message UpdateMetadataResponse {
  bool success = 1;
  string message = 2;
}
