version: '3.8'

services:
  node1:
    build:
      context: ../../
      dockerfile: examples/3-nodes/Dockerfile
    image: gravity-agent
    hostname: node1
    environment:
      - AGENT_ID=node1
      - BIND_ADDR=node1:8000
      - HTTP_ADDR=:8080
      - DATA_DIR=/data
      - BOOTSTRAP=true
      - BOOTSTRAP_EXPECT=3
      - PEERS=node2=node2:8000,node3=node3:8000
      - CLEAN=true
      - LLM_PROVIDER=gemini
      - API_KEY=${GEMINI_API_KEY}
    ports:
      - "8081:8080"
    volumes:
      - node1-data:/data

  node2:
    image: gravity-agent
    hostname: node2
    depends_on:
      - node1
    environment:
      - AGENT_ID=node2
      - BIND_ADDR=node2:8000
      - HTTP_ADDR=:8080
      - DATA_DIR=/data
      - BOOTSTRAP=false
      - PEERS=node1=node1:8000,node3=node3:8000
      - CLEAN=true
      - LLM_PROVIDER=gemini
      - API_KEY=${GEMINI_API_KEY}
    ports:
      - "8082:8080"
    volumes:
      - node2-data:/data

  node3:
    image: gravity-agent
    hostname: node3
    depends_on:
      - node1
    environment:
      - AGENT_ID=node3
      - BIND_ADDR=node3:8000
      - HTTP_ADDR=:8080
      - DATA_DIR=/data
      - BOOTSTRAP=false
      - PEERS=node1=node1:8000,node2=node2:8000
      - CLEAN=true
      - LLM_PROVIDER=gemini
      - API_KEY=${GEMINI_API_KEY}
    ports:
      - "8083:8080"
    volumes:
      - node3-data:/data

volumes:
  node1-data:
  node2-data:
  node3-data:
