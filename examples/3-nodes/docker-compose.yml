version: '3.8'

services:
  node1:
    build:
      context: ../../
      dockerfile: examples/3-nodes/Dockerfile
    image: gravity-agent
    hostname: node1
    environment:
      - GRAVITY_AGENT_ID=node1
      - GRAVITY_BIND_ADDR=node1:8000
      - GRAVITY_HTTP_ADDR=:8080
      - GRAVITY_DATA_DIR=/data
      - GRAVITY_BOOTSTRAP=true
      - GRAVITY_CLEAN=TRUE
      - GRAVITY_PEERS=node2=node2:8000, node3=node3:8000
      - GRAVITY_LLM_PROVIDER=gemini
      - GRAVITY_API_KEY=${GEMINI_API_KEY}
    ports:
      - "8080:8080"
    volumes:
      - node1-data:/data

  node2:
    image: gravity-agent
    hostname: node2
    depends_on:
      - node1
    environment:
      - GRAVITY_AGENT_ID=node2
      - GRAVITY_BIND_ADDR=node2:8000
      - GRAVITY_HTTP_ADDR=:8080
      - GRAVITY_DATA_DIR=/data
      - GRAVITY_BOOTSTRAP=false
      - GRAVITY_PEERS=node1=node1:8000, node3=node3:8000
      - GRAVITY_LLM_PROVIDER=gemini
      - GRAVITY_API_KEY=${GEMINI_API_KEY}
      - GRAVITY_CLEAN=TRUE
    volumes:
      - node2-data:/data

  node3:
    image: gravity-agent
    hostname: node3
    depends_on:
      - node1
    environment:
      - GRAVITY_AGENT_ID=node3
      - GRAVITY_BIND_ADDR=node3:8000
      - GRAVITY_HTTP_ADDR=:8080
      - GRAVITY_DATA_DIR=/data
      - GRAVITY_BOOTSTRAP=false
      - GRAVITY_PEERS=node1=node1:8000, node2=node2:8000
      - GRAVITY_LLM_PROVIDER=ollama
      - GRAVITY_CLEAN=TRUE
      - GRAVITY_LLM_MODEL=deepseek-v2:latest
      - GRAVITY_OLLAMA_URL=http://host.docker.internal:11434
    volumes:
      - node3-data:/data

volumes:
  node1-data:
  node2-data:
  node3-data:
